# ─────────────────────────────────────────────────────────────────────────────
# Cloudflare Workers — 7SEVEN CARDS
# Production domain: https://7evencards.xyz
# Docs: https://developers.cloudflare.com/workers/wrangler/configuration/
#
# SETUP STEPS:
#   1. Set all GitHub Secrets below in repo Settings → Secrets → Actions
#   2. Push to `main` — GitHub Actions builds and deploys automatically.
#   OR deploy manually:
#   1. Install Wrangler:  bun add -g wrangler
#   2. Login:            wrangler login
#   3. Deploy:           wrangler deploy --env production
#
# Required GitHub Secrets:
#   CLOUDFLARE_API_TOKEN      — Cloudflare dashboard → My Profile → API Tokens
#   CLOUDFLARE_ACCOUNT_ID     — Cloudflare dashboard → right sidebar
#   VITE_SUPABASE_URL         — Supabase → Settings → API
#   VITE_SUPABASE_ANON_KEY    — Supabase → Settings → API
#   SUPABASE_SERVICE_ROLE_KEY — Supabase → Settings → API (keep secret!)
#   SQUADCO_SECRET_KEY        — Squadco dashboard → API keys
#   BUSHA_API_KEY             — Busha dashboard
#   ONESIGNAL_APP_ID          — OneSignal dashboard
#   ONESIGNAL_REST_API_KEY    — OneSignal dashboard
#   RELOADLY_CLIENT_ID        — Reloadly dashboard
#   RELOADLY_CLIENT_SECRET    — Reloadly dashboard
#   DOJAH_APP_ID              — Dojah dashboard → Apps → API Keys
#   DOJAH_SECRET_KEY          — Dojah dashboard → Apps → API Keys
#   MONO_SECRET_KEY           — Mono dashboard → Apps → API Keys (identity primary + payment fallback)
#   MONO_PUBLIC_KEY           — Mono dashboard → Apps → API Keys (client-side Connect SDK)
#   APP_SECRET                — Any strong random string (session signing)
#   ADMIN_TELEGRAM_BOT_TOKEN  — BotFather
#   ADMIN_TELEGRAM_BOT_USERNAME — BotFather (without @)
#   ADMIN_TELEGRAM_CHAT_ID    — Your admin Telegram chat ID
#   ADMIN_TELEGRAM_WEBHOOK_SECRET — Random string for webhook auth
#   TELEGRAM_BOT_TOKEN        — BotFather (vendor bot)
#   TELEGRAM_WEBHOOK_SECRET   — Random string for vendor webhook auth
#   CRON_SECRET               — Random string for cron auth
#   GEMINI_API_KEY            — Google AI Studio → API Keys (for OCR gift card scanning)
#   RESEND_API_KEY            — Resend dashboard → API Keys (for admin trade emails)
#   ADMIN_EMAIL               — Admin email address to receive trade notifications
#   ONESIGNAL_ANDROID_CHANNEL_ID — OneSignal → Android channel
#   SUPPORT_EMAIL             — Override support@7evencards.xyz if needed
#   SUPPORT_TELEGRAM_CHAT_ID  — Telegram chat for user support
#   SUPPORT_WHATSAPP          — WhatsApp number (digits only, e.g. 2348012345678)
#   SENTRY_DSN                — Sentry → Project → Settings → Client Keys (DSN)
# ─────────────────────────────────────────────────────────────────────────────

name               = "seven-cards"
main               = ".output/server/index.mjs"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Static assets (built by Vite)
[assets]
directory = ".output/public"
binding   = "ASSETS"

# ─── Development (wrangler dev) ───────────────────────────────────────────────
[env.development]
name = "seven-cards-dev"

[env.development.vars]
SQUADCO_ENV  = "sandbox"
RELOADLY_ENV = "sandbox"
VITE_APP_URL = "http://localhost:8787"
APP_URL      = "http://localhost:8787"
NODE_ENV     = "development"

# ─── Production (wrangler deploy --env production) ───────────────────────────
[env.production]
name = "seven-cards"

# Non-secret runtime config baked into the Worker at deploy time.
# Secrets (keys, tokens) are injected by GitHub Actions via `wrangler secret put`.
[env.production.vars]
SQUADCO_ENV  = "production"
RELOADLY_ENV = "production"
NODE_ENV     = "production"
IS_DEMO_MODE = "false"
VITE_APP_URL = "https://7evencards.xyz"
APP_URL      = "https://7evencards.xyz"

# ─── Subdomain routing ────────────────────────────────────────────────────────
# Apex domain — all consumer traffic
[[env.production.routes]]
pattern   = "7evencards.xyz/*"
zone_name = "7evencards.xyz"

# www → apex redirect (handled in server.ts)
[[env.production.routes]]
pattern   = "www.7evencards.xyz/*"
zone_name = "7evencards.xyz"

# vendor.7evencards.xyz → rewrites to /vendor/* (handled in server.ts)
[[env.production.routes]]
pattern   = "vendor.7evencards.xyz/*"
zone_name = "7evencards.xyz"

# admin.7evencards.xyz → rewrites to /admin/* (handled in server.ts)
# Separate admin portal with its own login gate and auth checks.
[[env.production.routes]]
pattern   = "admin.7evencards.xyz/*"
zone_name = "7evencards.xyz"

# ─── Cron Triggers ────────────────────────────────────────────────────────────
# All crons invoke the scheduled() export (injected post-build by
# scripts/patch-cf-scheduled.mjs). The handler checks event.cron to route to
# the correct /api/cron/* endpoint.
#
# "0 */6 * * *"  — every 6 hours    → /api/cron/rate-check (vendor rate updates)
# "0 18 * * 4"   — Thursday 18:00 UTC (= 19:00 WAT = 7pm Nigerian Time)
#                  → /api/cron/weekly-commission (₦500 to qualifying traders)
# "0 2 * * *"    — daily at 02:00 UTC → /api/cron/reconcile (reconciliation engine)
# "0 10 */3 * *" — every 3 days at 10:00 UTC → /api/cron/keepalive
#                  (Supabase free-tier keep-alive — prevents 7-day auto-pause)
[env.production.triggers]
crons = ["0 */6 * * *", "0 18 * * 4", "0 2 * * *", "0 10 */3 * *", "0 8 * * 1"]

# ─── Workers Rate Limiting (distributed, edge-level) ─────────────────────────
# The app currently uses per-isolate in-process rate limiting (src/lib/rate-limiter.ts).
# To upgrade to true distributed rate limiting that spans all Worker instances,
# uncomment the blocks below and update server.ts to use the bindings
# (pass `env` down and call `await env.RATE_LIMITER_LOGIN.limit({ key: ip })`).
#
# Requires Workers Paid plan. Create namespaces via:
#   wrangler rate-limit create --name rate-limiter-login
#   wrangler rate-limit create --name rate-limiter-webhook
#   wrangler rate-limit create --name rate-limiter-kyc
#
[[unsafe.bindings]]
type         = "ratelimit"
name         = "RATE_LIMITER_LOGIN"
namespace_id = "1001"
simple       = { limit = 5, period = 60 }

[[unsafe.bindings]]
type         = "ratelimit"
name         = "RATE_LIMITER_WEBHOOK"
namespace_id = "1002"
simple       = { limit = 120, period = 60 }

[[unsafe.bindings]]
type         = "ratelimit"
name         = "RATE_LIMITER_KYC"
namespace_id = "1003"
simple       = { limit = 10, period = 60 }
