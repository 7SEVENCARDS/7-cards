name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-lint:
    name: Build, Lint & Type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Type-check
        run: pnpm run build:dev
        env:
          # Supabase (required for type-safe server functions)
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Third-party (build-time env injection)
          BUSHA_API_KEY: ${{ secrets.BUSHA_API_KEY }}
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          VITE_ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          RELOADLY_CLIENT_ID: ${{ secrets.RELOADLY_CLIENT_ID }}
          RELOADLY_CLIENT_SECRET: ${{ secrets.RELOADLY_CLIENT_SECRET }}
          SQUADCO_SECRET_KEY: ${{ secrets.SQUADCO_SECRET_KEY }}
          DOJAH_APP_ID: ${{ secrets.DOJAH_APP_ID }}
          DOJAH_SECRET_KEY: ${{ secrets.DOJAH_SECRET_KEY }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
          VITE_APP_URL: https://7evencards.xyz
          APP_URL: https://7evencards.xyz

      - name: Test
        run: pnpm run test

      - name: Typecheck (strict)
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint
        continue-on-error: true
