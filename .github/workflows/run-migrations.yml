name: Run Database Migrations

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to confirm running migrations against production Supabase'
        required: true
        default: ''
      dry_run:
        description: 'Dry run — connect and list tables without applying changes'
        type: boolean
        default: false

jobs:
  migrate:
    name: Apply SQL Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "YES" ]; then
            echo "::error::You must type YES in the confirm field to run migrations."
            exit 1
          fi

      - name: Install psql client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Test DB connection
        run: |
          DB_URL="${{ secrets.SUPABASE_DB_URL }}"
          echo "Testing connection..."
          # Try the URL as-is first (respects whatever port is in the URL)
          psql "${DB_URL}" -c "SELECT version();" -t --connect-timeout=15 2>&1 || {
            echo "Direct URL failed — trying with sslmode=require appended"
            # Append sslmode if not present
            if [[ "${DB_URL}" != *"sslmode"* ]]; then
              SEP="?"
              [[ "${DB_URL}" == *"?"* ]] && SEP="&"
              psql "${DB_URL}${SEP}sslmode=require" -c "SELECT version();" -t --connect-timeout=15
            fi
          }
          echo "Connection OK"

      - name: Dry run — list current tables
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "=== Current tables in public schema ==="
          psql "${{ secrets.SUPABASE_DB_URL }}" -c "\dt public.*" || true
          echo "=== Dry run complete — no changes applied ==="

      - name: Apply base schema
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: psql "${{ secrets.SUPABASE_DB_URL }}" --set ON_ERROR_STOP=0 --connect-timeout=30 -f supabase/schema.sql && echo "schema.sql done"

      - name: Apply migration 001 — subscriptions
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: psql "${{ secrets.SUPABASE_DB_URL }}" --set ON_ERROR_STOP=0 --connect-timeout=30 -f supabase/migrations/001_subscriptions.sql && echo "001 done"

      - name: Apply migration 002 — support_messages
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: psql "${{ secrets.SUPABASE_DB_URL }}" --set ON_ERROR_STOP=0 --connect-timeout=30 -f supabase/migrations/002_support_messages.sql && echo "002 done"

      - name: Apply migration 003 — complete_schema
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: psql "${{ secrets.SUPABASE_DB_URL }}" --set ON_ERROR_STOP=0 --connect-timeout=30 -f supabase/migrations/003_complete_schema.sql && echo "003 done"

      - name: Apply migration 004 — fix_constraints
