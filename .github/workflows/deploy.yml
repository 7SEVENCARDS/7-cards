name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:        # Allow manual deploys from the GitHub Actions UI

concurrency:
  group: deploy-production
  cancel-in-progress: false # Never cancel an in-flight deploy

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (production)
        run: bun run build
        env:
          NODE_ENV: production
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_APP_URL: ${{ secrets.VITE_APP_URL }}
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env production
        env:
          # All runtime secrets are bound via wrangler.toml [env.production.vars]
          # Sensitive values must be set via `wrangler secret put` or Cloudflare dashboard
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SQUADCO_SECRET_KEY: ${{ secrets.SQUADCO_SECRET_KEY }}
          BUSHA_API_KEY: ${{ secrets.BUSHA_API_KEY }}
          ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
          RELOADLY_CLIENT_ID: ${{ secrets.RELOADLY_CLIENT_ID }}
          RELOADLY_CLIENT_SECRET: ${{ secrets.RELOADLY_CLIENT_SECRET }}
          DOJAH_APP_ID: ${{ secrets.DOJAH_APP_ID }}
          DOJAH_SECRET_KEY: ${{ secrets.DOJAH_SECRET_KEY }}
          APP_SECRET: ${{ secrets.APP_SECRET }}

      - name: Post-deploy health check
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.VITE_APP_URL }}/api/health")
          echo "Health check → HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Health check returned $STATUS — check the deployment"
          fi
        continue-on-error: true
