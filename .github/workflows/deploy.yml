name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:        # Allow manual deploys from the GitHub Actions UI

concurrency:
  group: deploy-production
  cancel-in-progress: false # Never cancel an in-flight deploy

jobs:
  build-and-lint:
    name: Build, Lint & Type-check (deploy gate)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Type-check
        run: pnpm run build:dev
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BUSHA_API_KEY: ${{ secrets.BUSHA_API_KEY }}
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          VITE_ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          RELOADLY_CLIENT_ID: ${{ secrets.RELOADLY_CLIENT_ID }}
          RELOADLY_CLIENT_SECRET: ${{ secrets.RELOADLY_CLIENT_SECRET }}
          SQUADCO_SECRET_KEY: ${{ secrets.SQUADCO_SECRET_KEY }}
          DOJAH_APP_ID: ${{ secrets.DOJAH_APP_ID }}
          DOJAH_SECRET_KEY: ${{ secrets.DOJAH_SECRET_KEY }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
          VITE_APP_URL: https://7evencards.xyz
          APP_URL: https://7evencards.xyz

      - name: Test
        run: pnpm run test

      - name: Lint
        run: pnpm run lint
        continue-on-error: true

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production
    needs: build-and-lint    # Never deploy when CI fails

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build (production)
        run: pnpm run build
        env:
          NODE_ENV: production
          VITE_APP_URL: https://7evencards.xyz
          APP_URL: https://7evencards.xyz
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          VITE_ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}

      - name: Deploy to Cloudflare Workers
        run: pnpm exec wrangler deploy --config wrangler.toml --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # ── Upload runtime secrets to the production Worker ────────────────────
      # These are never baked into the build — they are injected at runtime by
      # Cloudflare Workers. Must be re-uploaded on every deploy so new secrets
      # take effect without manual intervention in the dashboard.
      - name: Upload secrets to Cloudflare Workers (main app)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          _SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          _SQUADCO_SECRET_KEY: ${{ secrets.SQUADCO_SECRET_KEY }}
          _RELOADLY_CLIENT_ID: ${{ secrets.RELOADLY_CLIENT_ID }}
          _RELOADLY_CLIENT_SECRET: ${{ secrets.RELOADLY_CLIENT_SECRET }}
          _BUSHA_API_KEY: ${{ secrets.BUSHA_API_KEY }}
          _APP_SECRET: ${{ secrets.APP_SECRET }}
          _ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          _ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
          _CRON_SECRET: ${{ secrets.CRON_SECRET }}
          _ONESIGNAL_ANDROID_CHANNEL_ID: ${{ secrets.ONESIGNAL_ANDROID_CHANNEL_ID }}
          _SUPPORT_EMAIL: ${{ secrets.SUPPORT_EMAIL }}
          _SUPPORT_TELEGRAM_CHAT_ID: ${{ secrets.SUPPORT_TELEGRAM_CHAT_ID }}
          _SUPPORT_WHATSAPP: ${{ secrets.SUPPORT_WHATSAPP }}
        run: |
          upload_secret() {
            local name="$1"
            local val="$2"
            if [ -n "$val" ]; then
              printf '%s' "$val" | pnpm exec wrangler secret put "$name" --env production
              echo "✓ Uploaded: $name"
            else
              echo "– Skipped (not set): $name"
            fi
          }
          upload_secret SUPABASE_SERVICE_ROLE_KEY "$_SUPABASE_SERVICE_ROLE_KEY"
          upload_secret SQUADCO_SECRET_KEY        "$_SQUADCO_SECRET_KEY"
          upload_secret RELOADLY_CLIENT_ID        "$_RELOADLY_CLIENT_ID"
          upload_secret RELOADLY_CLIENT_SECRET    "$_RELOADLY_CLIENT_SECRET"
          upload_secret BUSHA_API_KEY             "$_BUSHA_API_KEY"
          upload_secret APP_SECRET                "$_APP_SECRET"
          upload_secret ONESIGNAL_APP_ID          "$_ONESIGNAL_APP_ID"
          upload_secret ONESIGNAL_REST_API_KEY    "$_ONESIGNAL_REST_API_KEY"
          upload_secret CRON_SECRET               "$_CRON_SECRET"
          upload_secret ONESIGNAL_ANDROID_CHANNEL_ID "$_ONESIGNAL_ANDROID_CHANNEL_ID"
          upload_secret SUPPORT_EMAIL             "$_SUPPORT_EMAIL"
          upload_secret SUPPORT_TELEGRAM_CHAT_ID  "$_SUPPORT_TELEGRAM_CHAT_ID"
          upload_secret SUPPORT_WHATSAPP          "$_SUPPORT_WHATSAPP"

      # ── Telegram & Dojah — placeholder until credentials are ready ─────────
      - name: Upload Telegram & Dojah secrets to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          _TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          _TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          _ADMIN_TELEGRAM_BOT_TOKEN: ${{ secrets.ADMIN_TELEGRAM_BOT_TOKEN }}
          _ADMIN_TELEGRAM_BOT_USERNAME: ${{ secrets.ADMIN_TELEGRAM_BOT_USERNAME }}
          _ADMIN_TELEGRAM_CHAT_ID: ${{ secrets.ADMIN_TELEGRAM_CHAT_ID }}
          _ADMIN_TELEGRAM_WEBHOOK_SECRET: ${{ secrets.ADMIN_TELEGRAM_WEBHOOK_SECRET }}
          _DOJAH_APP_ID: ${{ secrets.DOJAH_APP_ID }}
          _DOJAH_SECRET_KEY: ${{ secrets.DOJAH_SECRET_KEY }}
        run: |
          upload_secret() {
            local name="$1"
            local val="$2"
            if [ -n "$val" ]; then
              printf '%s' "$val" | pnpm exec wrangler secret put "$name" --env production
              echo "✓ Uploaded: $name"
            else
              echo "– Skipped (not set): $name"
            fi
          }
          upload_secret TELEGRAM_BOT_TOKEN             "$_TELEGRAM_BOT_TOKEN"
          upload_secret TELEGRAM_WEBHOOK_SECRET         "$_TELEGRAM_WEBHOOK_SECRET"
          upload_secret ADMIN_TELEGRAM_BOT_TOKEN        "$_ADMIN_TELEGRAM_BOT_TOKEN"
          upload_secret ADMIN_TELEGRAM_BOT_USERNAME     "$_ADMIN_TELEGRAM_BOT_USERNAME"
          upload_secret ADMIN_TELEGRAM_CHAT_ID          "$_ADMIN_TELEGRAM_CHAT_ID"
          upload_secret ADMIN_TELEGRAM_WEBHOOK_SECRET   "$_ADMIN_TELEGRAM_WEBHOOK_SECRET"
          upload_secret DOJAH_APP_ID                    "$_DOJAH_APP_ID"
          upload_secret DOJAH_SECRET_KEY                "$_DOJAH_SECRET_KEY"
        continue-on-error: true   # Don't fail deploy if Telegram/Dojah not set yet

      - name: Register Telegram Webhooks
        run: |
          echo "Registering vendor bot webhook..."
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook" \
            -H "Content-Type: application/json" \
            -d "{\"url\":\"https://7evencards.xyz/api/webhooks/telegram\",\"allowed_updates\":[\"message\"],\"secret_token\":\"${TELEGRAM_WEBHOOK_SECRET}\"}" \
            | jq -r '"Vendor webhook: " + (.description // "ok")'

          echo "Registering admin bot webhook..."
          curl -s -X POST "https://api.telegram.org/bot${ADMIN_TELEGRAM_BOT_TOKEN}/setWebhook" \
            -H "Content-Type: application/json" \
            -d "{\"url\":\"https://7evencards.xyz/api/webhooks/telegram-admin\",\"allowed_updates\":[\"message\",\"callback_query\"],\"secret_token\":\"${ADMIN_TELEGRAM_WEBHOOK_SECRET}\"}" \
            | jq -r '"Admin webhook: " + (.description // "ok")'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          ADMIN_TELEGRAM_BOT_TOKEN: ${{ secrets.ADMIN_TELEGRAM_BOT_TOKEN }}
          ADMIN_TELEGRAM_WEBHOOK_SECRET: ${{ secrets.ADMIN_TELEGRAM_WEBHOOK_SECRET }}
        continue-on-error: true   # Don't fail deploy if bot tokens not set yet

      - name: Build API Worker (api.7evencards.xyz)
        run: node build-worker.mjs
        working-directory: artifacts/api-server

      - name: Deploy API Worker to Cloudflare (api.7evencards.xyz)
        run: pnpm exec wrangler deploy --env production
        working-directory: artifacts/api-server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Post-deploy health check
        run: |
          sleep 8
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://7evencards.xyz/api/health")
          echo "Main app health check → HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Main app health check returned $STATUS — check the deployment"
          fi
          API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://api.7evencards.xyz/api/healthz")
          echo "API worker health check → HTTP $API_STATUS"
          if [ "$API_STATUS" != "200" ]; then
            echo "::warning::API worker health check returned $API_STATUS — check the deployment"
          fi
        continue-on-error: true
