name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:        # Allow manual deploys from the GitHub Actions UI

concurrency:
  group: deploy-production
  cancel-in-progress: false # Never cancel an in-flight deploy

jobs:
  build-and-lint:
    name: Build, Lint & Type-check (deploy gate)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Type-check
        run: pnpm run typecheck
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VITE_APP_URL: https://7evencards.xyz
          APP_URL: https://7evencards.xyz

      - name: Test
        run: pnpm run test

      - name: Dependency vulnerability audit
        run: pnpm audit --audit-level=high --prod
        continue-on-error: true

      - name: Lint
        run: pnpm run lint
        continue-on-error: true

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production
    needs: build-and-lint    # Never deploy when CI fails

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build (production)
        run: pnpm run build
        env:
          NODE_ENV: production
          VITE_APP_URL: https://7evencards.xyz
          APP_URL: https://7evencards.xyz
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          VITE_ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      # ── Inject Cloudflare Workers scheduled() handler ───────────────────────
      # Nitro does not generate a scheduled() export — this post-build script
      # rewrites .output/server/index.mjs to add one. It self-calls the existing
      # /api/cron/rate-check HTTP endpoint so all business logic stays in server.ts.
      - name: Inject scheduled() into Cloudflare Worker output
        run: node scripts/patch-cf-scheduled.mjs

      - name: Deploy to Cloudflare Workers
        run: pnpm exec wrangler deploy --config wrangler.toml --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # ── Auto-generate APP_SECRET + CRON_SECRET on first deploy ──────────────
      - name: Auto-generate APP_SECRET and CRON_SECRET (if missing)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_PAT }}
          _APP_SECRET: ${{ secrets.APP_SECRET }}
          _CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          CF_SECRETS=$(pnpm exec wrangler secret list --env production 2>/dev/null | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{console.log(JSON.parse(d).map(s=>s.name).join(' '))}catch{console.log('')}})" || echo "")
          echo "Existing CF secrets: $CF_SECRETS"
          if [ -z "$_APP_SECRET" ] && ! echo "$CF_SECRETS" | grep -qw APP_SECRET; then
            APP_SECRET=$(openssl rand -hex 32)
            echo "Generating APP_SECRET"
            printf '%s' "$APP_SECRET" | pnpm exec wrangler secret put APP_SECRET --env production
            gh secret set APP_SECRET --body "$APP_SECRET" --repo ${{ github.repository }} || echo "⚠️  Could not save APP_SECRET to GitHub Secrets"
          else
            echo "– APP_SECRET already present, skipping"
          fi
          if [ -z "$_CRON_SECRET" ] && ! echo "$CF_SECRETS" | grep -qw CRON_SECRET; then
            CRON_SECRET=$(openssl rand -hex 32)
            echo "Generating CRON_SECRET"
            printf '%s' "$CRON_SECRET" | pnpm exec wrangler secret put CRON_SECRET --env production
            gh secret set CRON_SECRET --body "$CRON_SECRET" --repo ${{ github.repository }} || echo "⚠️  Could not save CRON_SECRET to GitHub Secrets"
          else
            echo "– CRON_SECRET already present, skipping"
          fi

      # ── Upload runtime secrets to the production Worker ────────────────────
      - name: Upload secrets to Cloudflare Workers (main app)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          _VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          _VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          _SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          _SQUADCO_SECRET_KEY: ${{ secrets.SQUADCO_SECRET_KEY }}
          _RELOADLY_CLIENT_ID: ${{ secrets.RELOADLY_CLIENT_ID }}
          _RELOADLY_CLIENT_SECRET: ${{ secrets.RELOADLY_CLIENT_SECRET }}
          _BUSHA_API_KEY: ${{ secrets.BUSHA_API_KEY }}
          _APP_SECRET: ${{ secrets.APP_SECRET }}
          _ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          _ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
          _CRON_SECRET: ${{ secrets.CRON_SECRET }}
          _ONESIGNAL_ANDROID_CHANNEL_ID: ${{ secrets.ONESIGNAL_ANDROID_CHANNEL_ID }}
          _SUPPORT_EMAIL: ${{ secrets.SUPPORT_EMAIL }}
          _SUPPORT_TELEGRAM_CHAT_ID: ${{ secrets.SUPPORT_TELEGRAM_CHAT_ID }}
          _SUPPORT_WHATSAPP: ${{ secrets.SUPPORT_WHATSAPP }}
          _RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          _ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          _GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          _SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          upload_secret() {
            local name="$1"
            local val="$2"
            if [ -n "$val" ]; then
              printf '%s' "$val" | pnpm exec wrangler secret put "$name" --env production
              echo "✓ Uploaded: $name"
            else
              echo "– Skipped (not set): $name"
            fi
          }
          upload_secret VITE_SUPABASE_URL          "$_VITE_SUPABASE_URL"
          upload_secret VITE_SUPABASE_ANON_KEY     "$_VITE_SUPABASE_ANON_KEY"
          upload_secret SUPABASE_SERVICE_ROLE_KEY  "$_SUPABASE_SERVICE_ROLE_KEY"
          upload_secret SQUADCO_SECRET_KEY         "$_SQUADCO_SECRET_KEY"
          upload_secret RELOADLY_CLIENT_ID         "$_RELOADLY_CLIENT_ID"
          upload_secret RELOADLY_CLIENT_SECRET     "$_RELOADLY_CLIENT_SECRET"
          upload_secret BUSHA_API_KEY              "$_BUSHA_API_KEY"
          upload_secret APP_SECRET                 "$_APP_SECRET"
          upload_secret ONESIGNAL_APP_ID           "$_ONESIGNAL_APP_ID"
          upload_secret ONESIGNAL_REST_API_KEY     "$_ONESIGNAL_REST_API_KEY"
          upload_secret CRON_SECRET                "$_CRON_SECRET"
          upload_secret ONESIGNAL_ANDROID_CHANNEL_ID "$_ONESIGNAL_ANDROID_CHANNEL_ID"
          upload_secret SUPPORT_EMAIL              "$_SUPPORT_EMAIL"
          upload_secret SUPPORT_TELEGRAM_CHAT_ID   "$_SUPPORT_TELEGRAM_CHAT_ID"
          upload_secret SUPPORT_WHATSAPP           "$_SUPPORT_WHATSAPP"
          upload_secret RESEND_API_KEY             "$_RESEND_API_KEY"
          upload_secret ADMIN_EMAIL                "$_ADMIN_EMAIL"
          upload_secret GEMINI_API_KEY             "$_GEMINI_API_KEY"
          upload_secret SENTRY_DSN                 "$_SENTRY_DSN"

      # ── Setup Resend email domain for custom branding ─────────────────────
      - name: Setup Resend email domain (7evencards.xyz)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "– RESEND_API_KEY not set — skipping Resend domain setup"
            exit 0
          fi

          ZONE_ID=$(curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones?name=7evencards.xyz" \
            | node -e "const d=[];process.stdin.on('data',c=>d.push(c));process.stdin.on('end',()=>{ try{const z=JSON.parse(d.join(''));console.log(z.result[0]?.id||'')}catch{console.log('')} })")
          echo "CF Zone ID: $ZONE_ID"

          DOMAINS_RESP=$(curl -s -H "Authorization: Bearer $RESEND_API_KEY" "https://api.resend.com/domains")
          DOMAIN_ID=$(echo "$DOMAINS_RESP" | node -e "const d=[];process.stdin.on('data',c=>d.push(c));process.stdin.on('end',()=>{ try{const r=JSON.parse(d.join(''));const dom=(r.data||[]).find(d=>d.name==='7evencards.xyz');console.log(dom?.id||'')}catch{console.log('')} })")
          DOMAIN_STATUS=$(echo "$DOMAINS_RESP" | node -e "const d=[];process.stdin.on('data',c=>d.push(c));process.stdin.on('end',()=>{ try{const r=JSON.parse(d.join(''));const dom=(r.data||[]).find(d=>d.name==='7evencards.xyz');console.log(dom?.status||'')}catch{console.log('')} })")

          if [ -z "$DOMAIN_ID" ]; then
            echo "Creating 7evencards.xyz domain in Resend..."
            CREATE_RESP=$(curl -s -X POST \
              -H "Authorization: Bearer $RESEND_API_KEY" \
              -H "Content-Type: application/json" \
              "https://api.resend.com/domains" \
              -d '{"name":"7evencards.xyz","region":"us-east-1"}')
            DOMAIN_ID=$(echo "$CREATE_RESP" | node -e "const d=[];process.stdin.on('data',c=>d.push(c));process.stdin.on('end',()=>{ try{const r=JSON.parse(d.join(''));console.log(r.id||'')}catch{console.log('')} })")
            RECORDS_JSON=$(echo "$CREATE_RESP" | node -e "const d=[];process.stdin.on('data',c=>d.push(c));process.stdin.on('end',()=>{ try{const r=JSON.parse(d.join(''));console.log(JSON.stringify(r.records||[]))}catch{console.log('[]')} })")
            echo "Domain created in Resend: $DOMAIN_ID"
          else
            echo "Domain already in Resend (id: $DOMAIN_ID, status: $DOMAIN_STATUS)"
            DOMAIN_DETAIL=$(curl -s -H "Authorization: Bearer $RESEND_API_KEY" "https://api.resend.com/domains/$DOMAIN_ID")
            RECORDS_JSON=$(echo "$DOMAIN_DETAIL" | node -e "const d=[];process.stdin.on('data',c=>d.push(c));process.stdin.on('end',()=>{ try{const r=JSON.parse(d.join(''));console.log(JSON.stringify(r.records||[]))}catch{console.log('[]')} })")
          fi

          if [ -n "$ZONE_ID" ] && [ -n "$RECORDS_JSON" ] && [ "$RECORDS_JSON" != "[]" ]; then
            echo "Adding Resend DNS records to Cloudflare..."
            RECORD_COUNT=$(echo "$RECORDS_JSON" | jq 'length')
            for i in $(seq 0 $((RECORD_COUNT - 1))); do
              REC_TYPE=$(echo  "$RECORDS_JSON" | jq -r ".[$i].type  // empty")
              REC_NAME=$(echo  "$RECORDS_JSON" | jq -r ".[$i].name  // empty")
              REC_VALUE=$(echo "$RECORDS_JSON" | jq -r ".[$i].value // empty")
              REC_PRIORITY=$(echo "$RECORDS_JSON" | jq -r ".[$i].priority // empty")
              [ -z "$REC_NAME" ] || [ -z "$REC_VALUE" ] && continue
              EXISTING_COUNT=$(curl -s \
                -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?type=${REC_TYPE}&name=${REC_NAME}" \
                | jq '.result | length')
              if [ "${EXISTING_COUNT:-0}" -gt "0" ]; then
                echo "✓ Already exists: $REC_TYPE $REC_NAME"
                continue
              fi
              BODY=$(jq -n \
                --arg type    "$REC_TYPE" \
                --arg name    "$REC_NAME" \
                --arg content "$REC_VALUE" \
                '{type: $type, name: $name, content: $content, ttl: 1}')
              if [ -n "$REC_PRIORITY" ]; then
                BODY=$(echo "$BODY" | jq --argjson pri "$REC_PRIORITY" '. + {priority: $pri}')
              fi
              RESULT=$(curl -s -X POST \
                -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                -H "Content-Type: application/json" \
                "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
                -d "$BODY" \
                | jq -r 'if .success then "✓ Created: \(.result.type) \(.result.name)" else "✗ Error: \(.errors | tostring)" end')
              echo "$RESULT"
            done
          else
            echo "– Skipping DNS record creation (no zone ID or no records)"
          fi

          if [ -n "$DOMAIN_ID" ]; then
            VERIFY=$(curl -s -X POST \
              -H "Authorization: Bearer $RESEND_API_KEY" \
              "https://api.resend.com/domains/$DOMAIN_ID/verify")
            echo "Verification: $(echo $VERIFY | node -e "const d=[];process.stdin.on('data',c=>d.push(c));process.stdin.on('end',()=>{ try{const r=JSON.parse(d.join(''));console.log(r.object||JSON.stringify(r))}catch{console.log('')} })")"
          fi
        continue-on-error: true

      # ── Telegram & Dojah secrets ───────────────────────────────────────────
      - name: Upload Telegram & Dojah secrets to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          _TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          _TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          _ADMIN_TELEGRAM_BOT_TOKEN: ${{ secrets.ADMIN_TELEGRAM_BOT_TOKEN }}
          _ADMIN_TELEGRAM_BOT_USERNAME: ${{ secrets.ADMIN_TELEGRAM_BOT_USERNAME }}
          _ADMIN_TELEGRAM_CHAT_ID: ${{ secrets.ADMIN_TELEGRAM_CHAT_ID }}
          _ADMIN_TELEGRAM_WEBHOOK_SECRET: ${{ secrets.ADMIN_TELEGRAM_WEBHOOK_SECRET }}
          _DOJAH_APP_ID: ${{ secrets.DOJAH_APP_ID }}
          _DOJAH_SECRET_KEY: ${{ secrets.DOJAH_SECRET_KEY }}
        run: |
          upload_secret() {
            local name="$1"
            local val="$2"
            if [ -n "$val" ]; then
              printf '%s' "$val" | pnpm exec wrangler secret put "$name" --env production
              echo "✓ Uploaded: $name"
            else
              echo "– Skipped (not set): $name"
            fi
          }
          upload_secret TELEGRAM_BOT_TOKEN             "$_TELEGRAM_BOT_TOKEN"
          upload_secret TELEGRAM_WEBHOOK_SECRET         "$_TELEGRAM_WEBHOOK_SECRET"
          upload_secret ADMIN_TELEGRAM_BOT_TOKEN        "$_ADMIN_TELEGRAM_BOT_TOKEN"
          upload_secret ADMIN_TELEGRAM_BOT_USERNAME     "$_ADMIN_TELEGRAM_BOT_USERNAME"
          upload_secret ADMIN_TELEGRAM_CHAT_ID          "$_ADMIN_TELEGRAM_CHAT_ID"
          upload_secret ADMIN_TELEGRAM_WEBHOOK_SECRET   "$_ADMIN_TELEGRAM_WEBHOOK_SECRET"
          upload_secret DOJAH_APP_ID                    "$_DOJAH_APP_ID"
          upload_secret DOJAH_SECRET_KEY                "$_DOJAH_SECRET_KEY"
        continue-on-error: true

      - name: Register Telegram Webhooks
        run: |
          echo "Registering vendor bot webhook..."
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook" \
            -H "Content-Type: application/json" \
            -d "{\"url\":\"https://7evencards.xyz/api/webhooks/telegram\",\"allowed_updates\":[\"message\"],\"secret_token\":\"${TELEGRAM_WEBHOOK_SECRET}\"}" \
            | jq -r '"Vendor webhook: " + (.description // "ok")'

          echo "Registering admin bot webhook..."
          curl -s -X POST "https://api.telegram.org/bot${ADMIN_TELEGRAM_BOT_TOKEN}/setWebhook" \
            -H "Content-Type: application/json" \
            -d "{\"url\":\"https://7evencards.xyz/api/webhooks/telegram-admin\",\"allowed_updates\":[\"message\",\"callback_query\"],\"secret_token\":\"${ADMIN_TELEGRAM_WEBHOOK_SECRET}\"}" \
            | jq -r '"Admin webhook: " + (.description // "ok")'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          ADMIN_TELEGRAM_BOT_TOKEN: ${{ secrets.ADMIN_TELEGRAM_BOT_TOKEN }}
          ADMIN_TELEGRAM_WEBHOOK_SECRET: ${{ secrets.ADMIN_TELEGRAM_WEBHOOK_SECRET }}
        continue-on-error: true

      - name: Provision vendor.7evencards.xyz DNS record (CNAME, proxied)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          ZONE_ID=$(curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones?name=7evencards.xyz" \
            | node -e "const d=[];process.stdin.on('data',c=>d.push(c));process.stdin.on('end',()=>{ try{const z=JSON.parse(d.join(''));console.log(z.result[0]?.id||'')}catch{console.log('')} })")
          if [ -z "$ZONE_ID" ]; then
            echo "::warning::Could not get Cloudflare Zone ID — skipping vendor DNS"
            exit 0
          fi
          EXISTING=$(curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?type=CNAME&name=vendor.7evencards.xyz" \
            | node -e "const d=[];process.stdin.on('data',c=>d.push(c));process.stdin.on('end',()=>{ try{const r=JSON.parse(d.join(''));console.log(r.result?.length>0?r.result[0].id:'')}catch{console.log('')} })")
          if [ -n "$EXISTING" ]; then
            echo "✓ vendor CNAME already exists (ID: $EXISTING) — skipping"
          else
            RESULT=$(curl -s -X POST \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
              -d '{"type":"CNAME","name":"vendor","content":"7evencards.xyz","proxied":true,"ttl":1}' \
              | node -e "const d=[];process.stdin.on('data',c=>d.push(c));process.stdin.on('end',()=>{ try{const r=JSON.parse(d.join(''));console.log(r.success?'created:'+r.result.id:'err:'+JSON.stringify(r.errors))}catch{console.log('parse error')} })")
            echo "vendor CNAME: $RESULT"
          fi
        continue-on-error: true

      - name: Provision admin.7evencards.xyz DNS record (CNAME, proxied)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          ZONE_ID=$(curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones?name=7evencards.xyz" \
            | node -e "const d=[];process.stdin.on('data',c=>d.push(c));process.stdin.on('end',()=>{ try{const z=JSON.parse(d.join(''));console.log(z.result[0]?.id||'')}catch{console.log('')} })")
          if [ -z "$ZONE_ID" ]; then
            echo "::warning::Could not get Cloudflare Zone ID — skipping admin DNS"
            exit 0
          fi
          EXISTING=$(curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?type=CNAME&name=admin.7evencards.xyz" \
            | node -e "const d=[];process.stdin.on('data',c=>d.push(c));process.stdin.on('end',()=>{ try{const r=JSON.parse(d.join(''));console.log(r.result?.length>0?r.result[0].id:'')}catch{console.log('')} })")
          if [ -n "$EXISTING" ]; then
            echo "✓ admin CNAME already exists (ID: $EXISTING) — skipping"
          else
            RESULT=$(curl -s -X POST \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
              -d '{"type":"CNAME","name":"admin","content":"7evencards.xyz","proxied":true,"ttl":1}' \
              | node -e "const d=[];process.stdin.on('data',c=>d.push(c));process.stdin.on('end',()=>{ try{const r=JSON.parse(d.join(''));console.log(r.success?'created:'+r.result.id:'err:'+JSON.stringify(r.errors))}catch{console.log('parse error')} })")
            echo "admin CNAME: $RESULT"
          fi
        continue-on-error: true

      - name: Build API Worker (api.7evencards.xyz)
        run: node build-worker.mjs
        working-directory: artifacts/api-server

      - name: Deploy API Worker to Cloudflare (api.7evencards.xyz)
        run: |
          rm -rf ../../.wrangler/deploy
          pnpm exec wrangler deploy --config wrangler.toml --env production
        working-directory: artifacts/api-server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Post-deploy health check
        run: |
          sleep 8
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://7evencards.xyz/api/health")
          echo "Main app health check → HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Main app health check returned $STATUS — check the deployment"
          fi
          API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://api.7evencards.xyz/api/healthz")
          echo "API worker health check → HTTP $API_STATUS"
          VENDOR_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://vendor.7evencards.xyz/" || echo "000")
          echo "Vendor portal health check → HTTP $VENDOR_STATUS"
        continue-on-error: true
