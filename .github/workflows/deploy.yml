name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:        # Allow manual deploys from the GitHub Actions UI

concurrency:
  group: deploy-production
  cancel-in-progress: false # Never cancel an in-flight deploy

jobs:
  build-and-lint:
    name: Build, Lint & Type-check (deploy gate)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Type-check
        run: pnpm run build:dev
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BUSHA_API_KEY: ${{ secrets.BUSHA_API_KEY }}
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          RELOADLY_CLIENT_ID: ${{ secrets.RELOADLY_CLIENT_ID }}
          RELOADLY_CLIENT_SECRET: ${{ secrets.RELOADLY_CLIENT_SECRET }}
          SQUADCO_SECRET_KEY: ${{ secrets.SQUADCO_SECRET_KEY }}
          DOJAH_APP_ID: ${{ secrets.DOJAH_APP_ID }}
          DOJAH_SECRET_KEY: ${{ secrets.DOJAH_SECRET_KEY }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
          VITE_APP_URL: https://7evencards.xyz
          APP_URL: https://7evencards.xyz

      - name: Test
        run: pnpm run test

      - name: Lint
        run: pnpm run lint
        continue-on-error: true

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production
    needs: build-and-lint    # Never deploy when CI fails

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build (production)
        run: pnpm run build
        env:
          NODE_ENV: production
          VITE_APP_URL: https://7evencards.xyz
          APP_URL: https://7evencards.xyz
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}

      - name: Deploy to Cloudflare Workers
        run: pnpm exec wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Register Telegram Webhooks
        run: |
          echo "Registering vendor bot webhook..."
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook" \
            -H "Content-Type: application/json" \
            -d "{\"url\":\"https://7evencards.xyz/api/webhooks/telegram\",\"allowed_updates\":[\"message\"],\"secret_token\":\"${TELEGRAM_WEBHOOK_SECRET}\"}" \
            | jq -r '"Vendor webhook: " + (.description // "ok")'

          echo "Registering admin bot webhook..."
          curl -s -X POST "https://api.telegram.org/bot${ADMIN_TELEGRAM_BOT_TOKEN}/setWebhook" \
            -H "Content-Type: application/json" \
            -d "{\"url\":\"https://7evencards.xyz/api/webhooks/telegram-admin\",\"allowed_updates\":[\"message\",\"callback_query\"],\"secret_token\":\"${ADMIN_TELEGRAM_WEBHOOK_SECRET}\"}" \
            | jq -r '"Admin webhook: " + (.description // "ok")'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          ADMIN_TELEGRAM_BOT_TOKEN: ${{ secrets.ADMIN_TELEGRAM_BOT_TOKEN }}
          ADMIN_TELEGRAM_WEBHOOK_SECRET: ${{ secrets.ADMIN_TELEGRAM_WEBHOOK_SECRET }}
        continue-on-error: true   # Don't fail deploy if bot tokens not set yet

      - name: Build API Worker (api.7evencards.xyz)
        run: node build-worker.mjs
        working-directory: artifacts/api-server

      - name: Deploy API Worker to Cloudflare (api.7evencards.xyz)
        run: pnpm exec wrangler deploy --env production
        working-directory: artifacts/api-server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Post-deploy health check
        run: |
          sleep 8
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://7evencards.xyz/api/health")
          echo "Main app health check → HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Main app health check returned $STATUS — check the deployment"
          fi
          API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://api.7evencards.xyz/api/healthz")
          echo "API worker health check → HTTP $API_STATUS"
          if [ "$API_STATUS" != "200" ]; then
            echo "::warning::API worker health check returned $API_STATUS — check the deployment"
          fi
        continue-on-error: true
