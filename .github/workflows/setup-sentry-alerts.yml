name: Set up Sentry alert rules

# Run once manually to bootstrap alert rules in Sentry.
# Safe to re-run -- existing rules with the same name are left unchanged
# (Sentry returns 400 on duplicate names, which we treat as success).
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print API payloads but do not create rules"
        required: false
        default: "false"
        type: string

jobs:
  setup-alerts:
    name: Create Sentry alert rules
    runs-on: ubuntu-latest

    env:
      SENTRY_ORG:     ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      SENTRY_TOKEN:   ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_API:     https://de.sentry.io/api/0
      DRY_RUN:        ${{ github.event.inputs.dry_run }}

    steps:
      # Discover org metadata -- fetch first available team ID for metric alert actions.
      - name: Fetch team info
        run: |
          TEAM_ID=$(curl -sf \
            "$SENTRY_API/teams/$SENTRY_ORG/" \
            -H "Authorization: Bearer $SENTRY_TOKEN" | \
            python3 -c "
import json, sys
data = json.load(sys.stdin)
if isinstance(data, list) and data:
    print(data[0]['id'])
else:
    print('')
" 2>/dev/null || echo "")
          echo "TEAM_ID=$TEAM_ID" >> "$GITHUB_ENV"
          echo "Discovered team ID: ${TEAM_ID:-<none>}"

      # Issue alert: New Issue
      # Fires the first time a new error fingerprint appears in production.
      - name: Create "New Issue" alert rule
        run: |
          PAYLOAD='{
            "name": "New Issue (production)",
            "actionMatch": "all",
            "filterMatch": "all",
            "conditions": [
              {"id": "sentry.rules.conditions.first_seen_event.FirstSeenEventCondition"}
            ],
            "filters": [
              {
                "id": "sentry.rules.filters.tagged_event.TaggedEventFilter",
                "key": "environment",
                "match": "eq",
                "value": "production"
              }
            ],
            "actions": [
              {
                "id": "sentry.mail.actions.NotifyEmailAction",
                "targetType": "IssueOwners",
                "fallthroughType": "ActiveMembers"
              }
            ],
            "frequency": 1440
          }'
          echo "Payload: $PAYLOAD"
          if [ "$DRY_RUN" = "true" ]; then echo "-- dry run, skipping POST"; exit 0; fi
          STATUS=$(curl -s -o /tmp/resp.json -w "%{http_code}" -X POST \
            "$SENTRY_API/projects/$SENTRY_ORG/$SENTRY_PROJECT/rules/" \
            -H "Authorization: Bearer $SENTRY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ]; then
            echo "Created (HTTP $STATUS)"
          elif [ "$STATUS" = "400" ]; then
            echo "Already exists (HTTP 400 -- skipping)"
          else
            echo "Unexpected HTTP $STATUS:"; cat /tmp/resp.json; exit 1
          fi

      # Issue alert: Regression
      # Fires when a resolved issue reappears in production.
      - name: Create "Regression" alert rule
        run: |
          PAYLOAD='{
            "name": "Regression (production)",
            "actionMatch": "all",
            "filterMatch": "all",
            "conditions": [
              {"id": "sentry.rules.conditions.regression_event.RegressionEventCondition"}
            ],
            "filters": [
              {
                "id": "sentry.rules.filters.tagged_event.TaggedEventFilter",
                "key": "environment",
                "match": "eq",
                "value": "production"
              }
            ],
            "actions": [
              {
                "id": "sentry.mail.actions.NotifyEmailAction",
                "targetType": "IssueOwners",
                "fallthroughType": "ActiveMembers"
              }
            ],
            "frequency": 1440
          }'
          echo "Payload: $PAYLOAD"
          if [ "$DRY_RUN" = "true" ]; then echo "-- dry run, skipping POST"; exit 0; fi
          STATUS=$(curl -s -o /tmp/resp.json -w "%{http_code}" -X POST \
            "$SENTRY_API/projects/$SENTRY_ORG/$SENTRY_PROJECT/rules/" \
            -H "Authorization: Bearer $SENTRY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ]; then
            echo "Created (HTTP $STATUS)"
          elif [ "$STATUS" = "400" ]; then
            echo "Already exists (HTTP 400 -- skipping)"
          else
            echo "Unexpected HTTP $STATUS:"; cat /tmp/resp.json; exit 1
          fi

      # Issue alert: High-frequency error
      # Fires when one issue fires >100x in 1 hour (tight retry loops / broken deps).
      - name: Create "High-frequency Error" alert rule
        run: |
          PAYLOAD='{
            "name": "High-frequency Error (production)",
            "actionMatch": "all",
            "filterMatch": "all",
            "conditions": [
              {
                "id": "sentry.rules.conditions.event_frequency.EventFrequencyCondition",
                "value": 100,
                "comparisonType": "count",
                "interval": "1h"
              }
            ],
            "filters": [
              {
                "id": "sentry.rules.filters.tagged_event.TaggedEventFilter",
                "key": "environment",
                "match": "eq",
                "value": "production"
              }
            ],
            "actions": [
              {
                "id": "sentry.mail.actions.NotifyEmailAction",
                "targetType": "IssueOwners",
                "fallthroughType": "ActiveMembers"
              }
            ],
            "frequency": 60
          }'
          echo "Payload: $PAYLOAD"
          if [ "$DRY_RUN" = "true" ]; then echo "-- dry run, skipping POST"; exit 0; fi
          STATUS=$(curl -s -o /tmp/resp.json -w "%{http_code}" -X POST \
            "$SENTRY_API/projects/$SENTRY_ORG/$SENTRY_PROJECT/rules/" \
            -H "Authorization: Bearer $SENTRY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ]; then
            echo "Created (HTTP $STATUS)"
          elif [ "$STATUS" = "400" ]; then
            echo "Already exists (HTTP 400 -- skipping)"
          else
            echo "Unexpected HTTP $STATUS:"; cat /tmp/resp.json; exit 1
          fi

      # Metric alert: Error Spike
      # warning: >20 errors/5 min   critical: >100 errors/5 min
      - name: Create "Error Spike" metric alert
        run: |
          if [ -n "$TEAM_ID" ]; then
            ACTIONS="[{\"type\":\"email\",\"targetType\":\"team\",\"targetIdentifier\":\"$TEAM_ID\"}]"
          else
            ACTIONS="[]"
          fi
          PAYLOAD="{
            \"name\": \"Error Spike (production)\",
            \"dataset\": \"events\",
            \"aggregate\": \"count()\",
            \"query\": \"level:error\",
            \"timeWindow\": 5,
            \"thresholdType\": 0,
            \"resolveThreshold\": 10,
            \"environment\": \"production\",
            \"triggers\": [
              {\"label\": \"critical\", \"alertThreshold\": 100, \"actions\": $ACTIONS},
              {\"label\": \"warning\",  \"alertThreshold\": 20,  \"actions\": $ACTIONS}
            ]
          }"
          echo "Payload: $PAYLOAD"
          if [ "$DRY_RUN" = "true" ]; then echo "-- dry run, skipping POST"; exit 0; fi
          STATUS=$(curl -s -o /tmp/resp.json -w "%{http_code}" -X POST \
            "$SENTRY_API/projects/$SENTRY_ORG/$SENTRY_PROJECT/alert-rules/" \
            -H "Authorization: Bearer $SENTRY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ]; then
            echo "Created (HTTP $STATUS)"
          elif [ "$STATUS" = "400" ]; then
            MSG=$(python3 -c "import json,sys; print(json.load(sys.stdin))" < /tmp/resp.json 2>/dev/null || cat /tmp/resp.json)
            if echo "$MSG" | grep -qi "already\|duplicate\|name"; then
              echo "Already exists -- skipping"
            else
              echo "HTTP 400: $MSG"; exit 1
            fi
          else
            echo "Unexpected HTTP $STATUS:"; cat /tmp/resp.json; exit 1
          fi

      - name: Summary
        run: |
          echo ""
          echo "Alert rules configured for $SENTRY_ORG / $SENTRY_PROJECT:"
          echo "  New Issue (production)       -- first occurrence of any new error"
          echo "  Regression (production)      -- resolved issue reappears"
          echo "  High-frequency Error         -- >100 events from one issue / 1h"
          echo "  Error Spike (production)     -- warning >20, critical >100 / 5 min"
          echo ""
          echo "View and tune: https://7even.sentry.io/alerts/"
